<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Generated — Resume Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=4">
</head>
<body>
    <header class="site-header">
        <div class="header-container">
            <a class="brand" href="{{ url_for('index') }}">
                <span class="brand-logo" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="8" y1="13" x2="16" y2="13"/>
                        <line x1="8" y1="17" x2="13" y2="17"/>
                    </svg>
                </span>
                <div class="brand-text">
                    <strong>Resume Builder</strong>
                    <span>ATS-Friendly PDF Export</span>
                </div>
            </a>
        </div>
    </header>

    <main class="success-page">
        <section class="success-card">
            <div class="success-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                    <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
            </div>
            <p class="eyebrow">Resume export complete</p>
            <h1>Your resume is ready!</h1>
            <p class="success-detail"><strong>{{ full_name }}</strong> — <code>{{ filename }}</code> has been generated successfully.</p>
            <div class="success-actions">
                <a class="submit-button download-button" href="{{ download_url }}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Download Resume
                </a>
                <a class="secondary-button" href="{{ url_for('index') }}">Create Another Resume</a>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-bottom">
            <div class="footer-container footer-bottom-inner">
                <p>&copy; 2026 Resume Builder. Built with Flask &amp; fpdf2.</p>
                <a class="footer-link" href="{{ url_for('index') }}">Back to Builder</a>
            </div>
        </div>
    </footer>
</body>
</html>
